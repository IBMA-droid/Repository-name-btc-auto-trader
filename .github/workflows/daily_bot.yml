name: BTC 自動売買ダッシュボード 毎日更新

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 00:00 UTC = 09:00 JST
  workflow_dispatch:        # 手動実行ボタン

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy matplotlib requests

      - name: ボット実行（ダッシュボード生成）
        run: python bot/main.py
        env:
          BITFLYER_API_KEY:    ${{ secrets.BITFLYER_API_KEY }}
          BITFLYER_API_SECRET: ${{ secrets.BITFLYER_API_SECRET }}
          PAPER_MODE: "true"

      - name: GitHub Pages に公開
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "BTC Bot"
          mkdir -p docs
          cp btc_dashboard.html docs/index.html
          git add docs/index.html
          git diff --staged --quiet || git commit -m "📊 ダッシュボード自動更新 $(date +'%Y-%m-%d %H:%M JST' -d '+9 hours')"
          git push
