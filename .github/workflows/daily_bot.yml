name: BTC自動売買ボット（毎日09:00 JST）

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリをインストール
        run: pip install yfinance pandas numpy matplotlib requests

      - name: ボット実行（HTML生成）
        env:
          BITFLYER_API_KEY:    ${{ secrets.BITFLYER_API_KEY }}
          BITFLYER_API_SECRET: ${{ secrets.BITFLYER_API_SECRET }}
        run: python bot/main.py

      - name: ダッシュボードをリポジトリに保存
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "BTC Bot"
          mkdir -p docs
          cp btc_dashboard.html docs/index.html
          git add docs/index.html
          git diff --staged --quiet || git commit -m "📊 ダッシュボード更新: $(date '+%Y-%m-%d %H:%M JST')"
          git push
